  <text x="640" y="415" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#10b981">🛡️  12 trackers blocked today</text>
  <rect x="550" y="435" width="180" height="30" fill="url(#blue)" rx="15"/>
  <text x="640" y="453" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#fff">Klat Engine v2.1</text>
  
  <!-- Engine comparison -->

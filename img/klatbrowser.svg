  <g font-family="system-ui" font-size="11" fill="#ccc" transform="translate(100, 540)">
    <text x="0" y="0">Feature</text>
    <text x="180" y="0" text-anchor="middle">Klat Engine</text>
    <text x="330" y="0" text-anchor="middle">Chromium</text>
    <text x="480" y="0" text-anchor="middle">Gecko</text>
    <text x="630" y="0" text-anchor="middle">WebKit</text>
  </g>
  <g font-family="system-ui" font-size="11" transform="translate(100, 565)">
    <text x="0" y="0" fill="#fff">Binary Size</text>
    <text x="180" y="0" text-anchor="middle" fill="#10b981">~45 MB</text>
    <text x="330" y="0" text-anchor="middle" fill="#888">~180 MB</text>
    <text x="480" y="0" text-anchor="middle" fill="#888">~120 MB</text>
    <text x="630" y="0" text-anchor="middle" fill="#888">~90 MB</text>
    <text x="0" y="25" fill="#fff">RAM (10 tabs)</text>
    <text x="180" y="25" text-anchor="middle" fill="#10b981">~380 MB</text>
    <text x="330" y="25" text-anchor="middle" fill="#888">~650 MB</text>
    <text x="480" y="25" text-anchor="middle" fill="#888">~520 MB</text>
    <text x="630" y="25" text-anchor="middle" fill="#888">~480 MB</text>
    <text x="0" y="50" fill="#fff">Native Adblock</text>
    <text x="180" y="50" text-anchor="middle" fill="#10b981">✅ Yes</text>
    <text x="330" y="50" text-anchor="middle" fill="#ef4444">❌ Limited</text>
    <text x="480" y="50" text-anchor="middle" fill="#10b981">✅ Yes</text>
    <text x="630" y="50" text-anchor="middle" fill="#f59e0b">⚠️ Partial</text>
    <text x="0" y="75" fill="#fff">Video Download</text>
    <text x="180" y="75" text-anchor="middle" fill="#10b981">✅ Built-in</text>
    <text x="330" y="75" text-anchor="middle" fill="#ef4444">❌ Extension</text>
    <text x="480" y="75" text-anchor="middle" fill="#ef4444">❌ Extension</text>
    <text x="630" y="75" text-anchor="middle" fill="#ef4444">❌ Extension</text>
    <text x="0" y="100" fill="#fff">Custom Engine Mods</text>
    <text x="180" y="100" text-anchor="middle" fill="#10b981">✅ Full</text>
    <text x="330" y="100" text-anchor="middle" fill="#f59e0b">⚠️ Flags</text>
    <text x="480" y="100" text-anchor="middle" fill="#f59e0b">⚠️ Prefs</text>
    <text x="630" y="100" text-anchor="middle" fill="#ef4444">❌ None</text>
  </g>
  
  <!-- Bottom -->
  <text x="640" y="680" text-anchor="middle" font-family="system-ui" font-size="12" fill="#666">
    🚀 Not Chromium  •  🛡️ Built-in Adblock  •  📹 Video Download  •  🎨 Themes  •  🔒 Zero Telemetry
  </text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="1280" height="720"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1280" height="48" fill="#0f0f23" opacity="0.95"/>
  <circle cx="24" cy="24" r="5" fill="#ef4444"/>
  <circle cx="38" cy="24" r="5" fill="#f59e0b"/>
  <circle cx="52" cy="24" r="5" fill="#10b981"/>
  <text x="640" y="30" text-anchor="middle" font-family="system-ui" font-size="14" fill="#888">https://github.com/klatasia  🔒 Secure</text>
  
  <!-- Toolbar -->
  <rect x="0" y="48" width="1280" height="56" fill="#1a1a2e"/>
  <rect x="20" y="58" width="400" height="36" fill="#0f0f23" rx="18"/>
  <text x="40" y="78" font-family="system-ui" font-size="13" fill="#6c63ff">🔒  https://klatasia.software</text>
  <circle cx="1220" cy="76" r="18" fill="url(#blue)" opacity="0.2"/>
  <text x="1220" y="80" text-anchor="middle" font-family="system-ui" font-size="14" fill="#6c63ff">➕</text>
  
  <!-- Tabs -->
  <rect x="20" y="120" width="1240" height="40" fill="#0f0f23" rx="8 8 0 0"/>
  <rect x="20" y="120" width="180" height="40" fill="#1a1a2e" rx="8 8 0 0"/>
  <text x="110" y="144" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#6c63ff">💻  KlatAsia</text>
  <text x="300" y="144" text-anchor="middle" font-family="system-ui" font-size="13" fill="#888">🤖  Klat AI</text>
  <text x="420" y="144" text-anchor="middle" font-family="system-ui" font-size="13" fill="#888">🌐  Klat Browser</text>
  <text x="540" y="144" text-anchor="middle" font-family="system-ui" font-size="13" fill="#888">📥  Klat Downloader</text>
  <circle cx="1240" cy="140" r="14" fill="#333"/>
  <text x="1240" y="144" text-anchor="middle" font-family="system-ui" font-size="14" fill="#888">+</text>
  
  <!-- Speed Dial -->
  <g font-family="system-ui" font-size="13" fill="#ccc">
    <rect x="80" y="190" width="240" height="140" fill="#0f0f23" rx="12"/>
    <text x="200" y="240" text-anchor="middle" font-size="32">🤖</text>
    <text x="200" y="280" text-anchor="middle" font-weight="bold" fill="#fff">Klat AI</text>
    <text x="200" y="300" text-anchor="middle" font-size="11" fill="#6c63ff">Click to chat</text>
    
    <rect x="360" y="190" width="240" height="140" fill="#0f0f23" rx="12"/>
    <text x="480" y="240" text-anchor="middle" font-size="32">📥</text>
    <text x="480" y="280" text-anchor="middle" font-weight="bold" fill="#fff">Klat Downloader</text>
    <text x="480" y="300" text-anchor="middle" font-size="11" fill="#10b981">Manage downloads</text>
    
    <rect x="640" y="190" width="240" height="140" fill="#0f0f23" rx="12"/>
    <text x="760" y="240" text-anchor="middle" font-size="32">📝</text>
    <text x="760" y="280" text-anchor="middle" font-weight="bold" fill="#fff">Klat Office</text>
    <text x="760" y="300" text-anchor="middle" font-size="11" fill="#f59e0b">Create documents</text>
    
    <rect x="920" y="190" width="240" height="140" fill="#0f0f23" rx="12"/>
    <text x="1040" y="240" text-anchor="middle" font-size="32">📺</text>
    <text x="1040" y="280" text-anchor="middle" font-weight="bold" fill="#fff">Klat Tube</text>
    <text x="1040" y="300" text-anchor="middle" font-size="11" fill="#ef4444">Watch ad-free</text>
  </g>
  
  <!-- Shield status -->

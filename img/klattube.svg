      <circle cx="24" cy="24" r="22" fill="url(#purple2)"/>
      <text x="24" y="28" text-anchor="middle" font-size="16" fill="#fff">💻</text>
      <text x="56" y="20" font-size="16" font-weight="bold" fill="#fff">KlatAsia Software</text>
      <text x="56" y="38" font-size="12" fill="#888">128K subscribers</text>
      <rect x="840" y="12" width="100" height="32" fill="#ef4444" rx="16"/>
      <text x="890" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Subscribe</text>
    </g>
    
    <!-- Meta -->
    <g transform="translate(0, 640)" font-size="13" fill="#888">
      <text x="0" y="0">👁  452K views</text>
      <text x="150" y="0">📅  3 days ago</text>
      <text x="300" y="0" fill="#10b981" font-weight="bold">🛡️  No Ads</text>
    </g>
    
    <!-- Actions -->

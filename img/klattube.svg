      <text x="48" y="140">🔥  Trending</text>
      <text x="48" y="180">🎵  Music</text>
      <text x="48" y="220">🎮  Gaming</text>
      <rect x="8" y="248" width="264" height="44" fill="#6c63ff" opacity="0.15" rx="8"/>
      <text x="48" y="276" fill="#6c63ff">📋  Subscriptions</text>
      <text x="48" y="316">🕐  History</text>
      <text x="48" y="356">⏰  Watch Later</text>
      <text x="48" y="396">📥  Downloads</text>
    </g>
    
    <!-- Sidebar footer -->

    <text x="50" y="664" text-anchor="middle" font-size="14">🌙</text>
    <circle cx="100" cy="660" r="18" fill="#1a1a2e" stroke="#333"/>
    <text x="100" y="664" text-anchor="middle" font-size="14">⚙</text>
  </g>
  
  <!-- Main Content -->
  <g font-family="system-ui" transform="translate(300, 20)">

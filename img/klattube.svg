    <rect x="0" y="0" width="960" height="540" fill="#000"/>
    <rect x="0" y="0" width="960" height="540" fill="url(#purple2)" opacity="0.15"/>
    <text x="480" y="240" text-anchor="middle" font-size="32" fill="#fff" opacity="0.7">

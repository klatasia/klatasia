    <rect x="0" y="500" width="60" height="4" fill="#8b5cf6" rx="2" title="Intro: 0:00 - 0:45"/>
    <rect x="650" y="500" width="70" height="4" fill="#ef4444" rx="2" title="Filler: 8:20 - 9:10"/>
    
    <text x="80" y="528" font-size="12" fill="#fff" font-variant-numeric="tabular-nums">4:23</text>
    <text x="880" y="528" font-size="12" fill="#fff" font-variant-numeric="tabular-nums">12:34</text>
    
    <!-- Controls -->

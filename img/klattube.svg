      <circle cx="180" cy="24" r="20" fill="#333"/>
      <text x="180" y="27" text-anchor="middle" font-size="14" fill="#fff">⏮</text>
      <circle cx="60" cy="24" r="20" fill="#333"/>
      <text x="60" y="27" text-anchor="middle" font-size="14" fill="#fff">⏭</text>
      
      <circle cx="840" cy="24" r="20" fill="#333"/>
      <text x="840" y="27" text-anchor="middle" font-size="14" fill="#ccc">🔊</text>
      <rect x="870" y="18" width="80" height="12" fill="#333" rx="6"/>
      <rect x="870" y="18" width="64" height="12" fill="#ef4444" rx="6"/>
      
      <circle cx="920" cy="24" r="20" fill="#333"/>
      <text x="920" y="27" text-anchor="middle" font-size="14" fill="#ccc">⛶</text>
    </g>
    
    <!-- Video Info -->
    <text x="0" y="580" font-size="20" font-weight="bold" fill="#fff">How Klat Engine Works - Technical Deep Dive</text>
    
    <!-- Channel -->

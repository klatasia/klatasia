  <text x="170" y="330" font-family="system-ui" font-size="18" fill="#1e293b">f(x) dx = F(b) − F(a)</text>
  <text x="100" y="380" font-family="system-ui" font-size="18" fill="#1e293b" font-weight="600">∑</text>
  <text x="130" y="365" font-family="serif" font-size="14" fill="#3b82f6">n</text>

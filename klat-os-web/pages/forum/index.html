<div class="container">
  <div class="forum-layout">
    <aside class="forum-sidebar">
      <div class="forum-search">
        <input type="text" id="forum-search" placeholder="Search threads...">
      </div>

      <h3>Categories</h3>
      <ul class="cat-list" id="category-list">
        <li><a href="#" class="active" data-cat="all">All Categories</a></li>
      </ul>

      <div class="forum-stats">
        <h3 style="font-size:.875rem;font-weight:600;margin-bottom:1rem">Statistics</h3>
        <div class="forum-stat"><span>Total Threads</span><span>50</span></div>
        <div class="forum-stat"><span>Total Posts</span><span>1,250</span></div>
        <div class="forum-stat"><span>Active Users</span><span>89</span></div>
        <div class="forum-stat"><span>Latest Member</span><span>DevNewbie</span></div>
      </div>
    </aside>

    <div class="forum-main">
      <div class="thread-header">
        <h1>Forum</h1>
        <div class="thread-filters">
          <button class="filter-btn active" data-view="latest">Latest</button>
          <button class="filter-btn" data-view="popular">Popular</button>
          <button class="filter-btn" data-view="pinned">Pinned</button>
        </div>
      </div>

      <div style="overflow-x:auto">
        <table class="thread-table">
          <thead>
            <tr>
              <th>Category</th>
              <th>Thread</th>
              <th>Replies</th>
              <th>Views</th>
              <th>Likes</th>
              <th>Author</th>
            </tr>
          </thead>
          <tbody id="thread-list">
            <tr>
              <td colspan="6" class="text-center" style="padding:2rem;color:var(--text3)">Loading threads...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="text-center mt-6">
        <p style="color:var(--text3);font-size:.8125rem">Showing all threads</p>
      </div>
    </div>
  </div>
</div>

<div class="container" style="padding-bottom:4rem">
  <div class="card mt-8">
    <h3 style="font-size:1.125rem;font-weight:600;margin-bottom:1.5rem">Create New Thread</h3>
    <form onsubmit="event.preventDefault();alert('Thread created!');">
      <div class="form-group">
        <label for="thread-cat">Category</label>
        <select id="thread-cat" required>
          <option value="">Select category...</option>
          <option value="Development">Development</option>
          <option value="Kernel">Kernel</option>
          <option value="Desktop">Desktop</option>
          <option value="Drivers">Drivers</option>
          <option value="Applications">Applications</option>
          <option value="Networking">Networking</option>
          <option value="Filesystem">Filesystem</option>
          <option value="Bug Report">Bug Report</option>
          <option value="Feature Request">Feature Request</option>
          <option value="General Discussion">General Discussion</option>
          <option value="Announcements">Announcements</option>
        </select>
      </div>
      <div class="form-group">
        <label for="thread-title">Title</label>
        <input type="text" id="thread-title" required>
      </div>
      <div class="form-group">
        <label for="thread-body">Content</label>
        <textarea id="thread-body" rows="6" required></textarea>
      </div>
      <button type="submit" class="btn btn-solid">Create Thread</button>
    </form>
  </div>
</div>

<script>
  (function() {
    var filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        filterBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
      });
    });
  })();
</script>
